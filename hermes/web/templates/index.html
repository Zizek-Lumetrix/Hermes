<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes · Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; }
header { padding: 16px 24px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 18px; font-weight: 600; }
#graph-container { width: 100%; height: 50vh; border-bottom: 1px solid #2a2a2a; }
#stream { padding: 24px; max-height: 30vh; overflow-y: auto; }
.stream-entry { padding: 8px 0; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
.stream-entry .type { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 8px; }
.type-conclusion { background: #1a3a1a; color: #4caf50; }
.type-prediction { background: #1a1a3a; color: #64b5f6; }
.type-pipeline { background: #3a3a1a; color: #ffc107; }
#scorecard { padding: 24px; border-top: 1px solid #2a2a2a; }
#scorecard table { width: 100%; border-collapse: collapse; font-size: 13px; }
#scorecard th, #scorecard td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #1a1a1a; }
#drawer { position: fixed; right: 0; top: 0; width: 400px; height: 100vh; background: #1a1a1a; border-left: 1px solid #2a2a2a; padding: 24px; overflow-y: auto; display: none; z-index: 100; }
#drawer.open { display: block; }
#drawer-close { background: none; border: none; color: #e0e0e0; font-size: 20px; cursor: pointer; float: right; }
.confirm-btn { padding: 6px 16px; margin: 4px; border: 1px solid #4a4a4a; background: #2a2a2a; color: #e0e0e0; border-radius: 4px; cursor: pointer; }
.confirm-btn.active { border-color: #4caf50; background: #1a3a1a; }
.time-slider { width: 200px; margin-left: 16px; }
svg text { fill: #e0e0e0; font-size: 11px; }
.links line { stroke: #3a3a3a; stroke-opacity: 0.6; }
</style>
</head>
<body>
<header>
  <h1>Hermes Knowledge Graph</h1>
  <label>Time: <input type="range" class="time-slider" id="time-slider" min="0" max="100" value="100"></label>
</header>

<div id="graph-container"></div>

<div id="stream">
  <h2 style="margin-bottom:12px;font-size:16px;">Cognitive Updates</h2>
  <div id="stream-entries">Loading...</div>
</div>

<div id="scorecard">
  <h2 style="margin-bottom:12px;font-size:16px;">Prediction Scorecard</h2>
  <table>
    <thead><tr><th>Prediction</th><th>Deadline</th><th>Result</th></tr></thead>
    <tbody id="scorecard-body"></tbody>
  </table>
</div>

<div id="drawer">
  <button id="drawer-close">&times;</button>
  <div id="drawer-content"></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>

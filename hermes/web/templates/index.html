<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes · Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; }
header { padding: 16px 24px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 18px; font-weight: 600; }
.tabs { display: flex; gap: 4px; padding: 12px 24px; border-bottom: 1px solid #2a2a2a; background: #141414; }
.tab-btn { padding: 6px 20px; border: 1px solid transparent; background: none; color: #888; border-radius: 4px; cursor: pointer; font-size: 13px; }
.tab-btn.active { background: #1a3a1a; border-color: #4caf50; color: #4caf50; }
.tab-btn:hover:not(.active) { color: #ccc; }
.tab-content { display: none; }
.tab-content.active { display: block; }
#graph-container { width: 100%; height: calc(100vh - 120px); border-bottom: 1px solid #2a2a2a; position: relative; }
	#graph-legend { position: absolute; top: 10px; right: 16px; background: rgba(20,20,20,0.9); border: 1px solid #333; border-radius: 8px; padding: 12px 16px; font-size: 12px; z-index: 10; }
	#graph-legend .legend-item { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
	#graph-legend .legend-swatch { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.surprise-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 16px; margin: 12px 24px; border-left: 4px solid #ff9800; }
.surprise-card .score { font-size: 20px; font-weight: bold; color: #ff9800; float: right; }
.panel { padding: 0 24px 24px; max-height: 40vh; overflow-y: auto; }
.panel table { width: 100%; border-collapse: collapse; font-size: 13px; }
.panel th, .panel td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #1a1a1a; }
.panel th { color: #888; font-weight: 500; }
.countdown { font-family: monospace; color: #ffc107; }
.result-correct { color: #4caf50; }
.result-incorrect { color: #f44336; }
.result-pending { color: #888; font-style: italic; }
#drawer { position: fixed; right: 0; top: 0; width: 520px; max-width: 100vw; height: 100vh; background: #1a1a1a; border-left: 1px solid #2a2a2a; padding: 24px; overflow-y: auto; display: none; z-index: 100; }
#drawer.open { display: block; }
#drawer-close { background: none; border: none; color: #e0e0e0; font-size: 20px; cursor: pointer; float: right; }
.confirm-btn { padding: 6px 16px; margin: 4px; border: 1px solid #4a4a4a; background: #2a2a2a; color: #e0e0e0; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
.confirm-btn.challenge { border-color: #f44336; }
.confirm-btn:hover:not(:disabled) { border-color: #4caf50; }
.confirm-btn.challenge:hover:not(:disabled) { border-color: #ff6f6f; background: #2a1a1a; }
.confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.confirm-btn.confirmed-active { border-color: #4caf50; background: #1a3a1a; color: #4caf50; }
.confirm-btn.challenged-active { border-color: #f44336; background: #2a1a1a; color: #f44336; }
.confirmation-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 13px; font-weight: 600; margin-left: 8px; }
.confirmation-badge.confirmed { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; }
.confirmation-badge.challenged { background: #2a1a1a; color: #f44336; border: 1px solid #f44336; }
.confirmation-badge.unmarked { background: #222; color: #888; border: 1px solid #444; }
#confirm-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
#confirm-toast.show { opacity: 1; }
#confirm-toast.success { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; }
#confirm-toast.error { background: #2a1a1a; color: #f44336; border: 1px solid #f44336; }
.meta { color: #888; font-size: 13px; margin: 2px 0; }
.version-line { font-size: 12px; padding: 3px 0; color: #aaa; border-bottom: 1px solid #222; }
.evidence-card { background: #222; border-radius: 6px; padding: 14px; margin: 10px 0; border-left: 3px solid #4a4a4a; }
.evidence-header { font-size: 15px; margin-bottom: 6px; }
.source-tag { background: #333; padding: 1px 8px; border-radius: 3px; font-size: 12px; color: #aaa; }
.source-url { color: #64b5f6; font-size: 13px; word-break: break-all; }
.analysis-section { font-size: 13px; margin-top: 8px; line-height: 1.5; color: #ccc; }
.analysis-section ul { margin: 4px 0 0 18px; }
.analysis-section li { margin: 3px 0; }
.node-label { pointer-events: none; }
svg text { fill: #e0e0e0; font-size: 11px; }
line.links { stroke: #3a3a3a; stroke-opacity: 0.6; }
line.cross_domain { stroke: #ff9800; stroke-opacity: 0.7; }
</style>
</head>
<body>
<header>
  <h1>Hermes Knowledge Graph</h1>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="graph">Knowledge Graph</button>
  <button class="tab-btn" data-tab="surprise">Surprise</button>
  <button class="tab-btn" data-tab="predictions">Predictions</button>
  <button class="tab-btn" data-tab="stream">Activity</button>
</div>

<div id="tab-graph" class="tab-content active">
  <div id="graph-container"></div>
</div>

<div id="tab-surprise" class="tab-content">
  <div class="panel" id="surprise-panel"></div>
</div>

<div id="tab-predictions" class="tab-content">
  <div class="panel">
    <h2 style="margin:16px 0;font-size:16px;">Pending Predictions</h2>
    <table><thead><tr><th>Prediction</th><th>Deadline</th><th>Countdown</th></tr></thead>
    <tbody id="pending-body"></tbody></table>
    <h2 style="margin:24px 0 16px;font-size:16px;">Verified Predictions</h2>
    <table><thead><tr><th>Prediction</th><th>Deadline</th><th>Result</th></tr></thead>
    <tbody id="verified-body"></tbody></table>
  </div>
</div>

<div id="tab-stream" class="tab-content">
  <div class="panel" id="stream-entries">Loading...</div>
</div>

<div id="drawer">
  <button id="drawer-close">&times;</button>
  <div id="drawer-content"></div>
</div>

<div id="confirm-toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
